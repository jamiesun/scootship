name: Docs

on:
  push:
    branches: [main]
    paths:
      - "README.md"
      - "AGENT.md"
      - "book.toml"
      - "docs/**"
      - "scripts/build-mdbook.sh"
      - "scripts/prepare-mdbook.sh"
      - ".github/workflows/docs.yml"
  pull_request:
    paths:
      - "README.md"
      - "AGENT.md"
      - "book.toml"
      - "docs/**"
      - "scripts/build-mdbook.sh"
      - "scripts/prepare-mdbook.sh"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

env:
  MDBOOK_VERSION: "0.5.3"

jobs:
  build:
    name: Build mdBook
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install mdBook
        run: cargo install mdbook --locked --version "$MDBOOK_VERSION"

      - name: Build bilingual docs
        run: ./scripts/build-mdbook.sh

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: book

  deploy:
    name: Deploy GitHub Pages
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
