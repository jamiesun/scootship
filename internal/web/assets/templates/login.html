{{define "login"}}<!doctype html>
<html lang="{{.Lang}}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{.Title}} · scootship</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="login-body">
    <div class="login-card">
      <div class="login-brand"><span class="brand-mark">⌁</span> scootship</div>
    <p class="login-sub">{{t .Lang "login.sub"}}</p>
    <nav class="login-lang lang-switch" aria-label="{{t .Lang "layout.language"}}">
      <a class="{{if eq .Lang "en"}}active{{end}}" href="{{langURL .CurrentPath "en"}}">EN</a>
      <span>/</span>
      <a class="{{if eq .Lang "zh"}}active{{end}}" href="{{langURL .CurrentPath "zh"}}">中文</a>
    </nav>

    {{if .Error}}<div class="login-error">{{.Error}}</div>{{end}}
    {{if not .Configured}}<div class="login-warn">{{t .Lang "login.auth_not_configured"}}</div>{{end}}

    <form method="post" action="/login" autocomplete="on">
      <input type="hidden" name="next" value="{{.Next}}">
      <label>{{t .Lang "login.username"}}
        <input name="user" autocomplete="username" autofocus required>
      </label>
      <label>{{t .Lang "login.password"}}
        <input name="password" type="password" autocomplete="current-password" required>
      </label>
      <label class="check-row">
        <input name="remember" type="checkbox" value="1">
        <span>{{t .Lang "login.remember"}}</span>
      </label>
      <button type="submit">{{t .Lang "login.sign_in"}}</button>
    </form>

    {{if .DevHint}}<p class="login-dev">{{t .Lang "login.dev_hint"}} <code>admin</code> / <code>admin</code></p>{{end}}
  </div>
  <div class="login-foot">scootship {{.Version}}</div>
</body>
</html>
{{end}}
